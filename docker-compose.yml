version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finances
      POSTGRES_USER: finances
      POSTGRES_PASSWORD: finances123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finances"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
